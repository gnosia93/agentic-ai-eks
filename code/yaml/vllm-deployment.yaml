apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen
  namespace: default
  labels:
    app: vllm-qwen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-qwen
  template:
    metadata:
      labels:
        app: vllm-qwen
    spec:
      nodeSelector:
        node.kubernetes.io/instance-type: g6e.12xlarge
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=Qwen/Qwen2.5-72B-Instruct   # Qwen3.5-27B 출시시 모델명 변경
            - --tensor-parallel-size=4             # g6e.12xlarge GPU 4장
            - --max-model-len=8192
            - --gpu-memory-utilization=0.90
            - --port=8000
            - --served-model-name=qwen
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: model-cache
          emptyDir: {}          # 프로덕션에서는 PVC 또는 S3 마운트 권장
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen-svc
  namespace: default
spec:
  selector:
    app: vllm-qwen
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
